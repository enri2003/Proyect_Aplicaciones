<!-- ExecutiveCalendarComponent — Module 7 | bg-[#101415] -->
<div class="min-h-screen flex flex-col" style="background:#101415; font-family:'Geist','Inter',ui-sans-serif,system-ui,sans-serif;">

  <!-- ══ TOP BAR ══ -->
  <header class="flex items-center justify-between px-8 py-4 border-b border-white/5 sticky top-0 z-10 bg-[#101415]/80 backdrop-blur-sm">
    <div class="flex items-center gap-3">
      <svg class="w-5 h-5 text-white/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <h1 class="text-white font-bold text-base">Calendario Ejecutivo</h1>
    </div>
    <span class="text-white/30 text-xs font-semibold uppercase tracking-widest">LEAD MEET</span>
  </header>

  <!-- ══ MAIN ══ -->
  <main class="flex-1 px-6 py-6 flex gap-5 max-w-[1200px] mx-auto w-full">

    <!-- ─── LEFT: Calendar grid (Task 3.1) ─── -->
    <div class="flex-1 flex flex-col gap-4">

      <!-- Month navigation -->
      <div class="flex items-center justify-between">
        <button (click)="prevMonth()"
                class="w-8 h-8 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
          <svg class="w-4 h-4 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>

        <h2 class="text-white font-bold text-lg tracking-tight">{{ currentMonthLabel }}</h2>

        <button (click)="nextMonth()"
                class="w-8 h-8 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
          <svg class="w-4 h-4 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

      <!-- Day headers (Mon-first) -->
      <div class="grid grid-cols-7 mb-1">
        <div *ngFor="let h of dayHeaders"
             class="text-center text-white/20 text-[10px] font-bold uppercase tracking-widest py-2">
          {{ h }}
        </div>
      </div>

      <!-- Skeleton while loading -->
      <div *ngIf="loading" class="grid grid-cols-7 gap-1">
        <div *ngFor="let _ of [].constructor(42)"
             class="aspect-square rounded-xl bg-white/[0.03] animate-pulse"></div>
      </div>

      <!-- Calendar grid (Task 3.1) -->
      <div *ngIf="!loading" class="grid grid-cols-7 gap-1">
        <button
          *ngFor="let day of calendarDays"
          (click)="day.isCurrentMonth && selectDay(day.date)"
          class="aspect-square flex flex-col items-center pt-2 rounded-xl border transition-all relative"
          [class.bg-white]="day.isSelected && day.isCurrentMonth"
          [class.border-white]="day.isSelected && day.isCurrentMonth"
          [class.bg-[#1d2022]]="!day.isSelected && day.isCurrentMonth && !day.isToday"
          [class.border-white\/5]="!day.isSelected && day.isCurrentMonth && !day.isToday"
          [class.bg-[#1d2022]]="day.isToday && !day.isSelected"
          [class.border-[#0055ff]\/40]="day.isToday && !day.isSelected"
          [class.bg-[#1d2022]\/20]="!day.isCurrentMonth"
          [class.border-white\/[0.02]]="!day.isCurrentMonth"
          [class.cursor-pointer]="day.isCurrentMonth"
          [class.cursor-default]="!day.isCurrentMonth"
          [class.hover:border-white\/20]="day.isCurrentMonth && !day.isSelected">

          <!-- Day number -->
          <span class="text-sm font-bold leading-none mb-1.5"
                [class.text-black]="day.isSelected && day.isCurrentMonth"
                [class.text-[#0055ff]]="day.isToday && !day.isSelected"
                [class.text-white]="day.isCurrentMonth && !day.isToday && !day.isSelected"
                [class.text-white\/15]="!day.isCurrentMonth">
            {{ day.dayNum }}
          </span>

          <!-- Event indicator dots (max 3) -->
          <div class="flex items-center gap-0.5 flex-wrap justify-center px-1">
            <span
              *ngFor="let ev of day.events.slice(0, 3)"
              class="w-1 h-1 rounded-full shrink-0"
              [class.bg-blue-500]="ev.type === 'strategy'"
              [class.bg-yellow-500]="ev.type === 'negotiation'"
              [class.bg-purple-500]="ev.type === 'interview'"
              [class.bg-white\/30]="ev.type === 'general'"
              [class.bg-black\/40]="day.isSelected">
            </span>
            <span *ngIf="day.events.length > 3"
                  class="text-[7px] font-bold leading-none"
                  [class.text-black\/40]="day.isSelected"
                  [class.text-white\/20]="!day.isSelected">
              +{{ day.events.length - 3 }}
            </span>
          </div>

        </button>
      </div>

      <!-- Legend -->
      <div class="flex items-center gap-4 mt-2 px-1">
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-blue-500"></span>
          <span class="text-white/25 text-[9px] uppercase tracking-widest">Estrategia</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
          <span class="text-white/25 text-[9px] uppercase tracking-widest">Negociación</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-purple-500"></span>
          <span class="text-white/25 text-[9px] uppercase tracking-widest">Entrevista</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-white/25"></span>
          <span class="text-white/25 text-[9px] uppercase tracking-widest">General</span>
        </div>
      </div>
    </div>

    <!-- ─── RIGHT: Sidebar (Tasks 3.2, 3.3) ─── -->
    <div class="w-72 xl:w-80 flex flex-col gap-4 shrink-0">

      <!-- Daily agenda sidebar (Task 3.2) -->
      <div class="bg-[#1d2022] border border-white/5 rounded-2xl p-5 flex-1 flex flex-col gap-4 min-h-0">
        <app-daily-agenda-sidebar
          [selectedDate]="selectedDate"
          [meetings]="selectedMeetings"
          (schedule)="onSchedule()">
        </app-daily-agenda-sidebar>
      </div>

      <!-- Quick notes (Task 3.3) -->
      <app-quick-notes
        [content]="noteContent"
        [saving]="noteSaving"
        [saved]="noteSaved"
        (save)="onNoteSave($event)">
      </app-quick-notes>

    </div>

  </main>
</div>
