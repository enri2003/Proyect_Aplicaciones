<!-- QuickNotesComponent — Task 3.3 -->
<div class="bg-[#1d2022] border border-white/5 rounded-xl p-4">

  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2">
      <svg class="w-3.5 h-3.5 text-white/30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
      <span class="text-white/40 text-[10px] font-bold uppercase tracking-widest">Notas Rápidas</span>
    </div>

    <!-- Autosave indicator -->
    <div class="flex items-center gap-1.5">
      <span *ngIf="saving" class="text-white/25 text-[9px]">Guardando...</span>
      <span *ngIf="saved && !saving" class="text-green-400/60 text-[9px] flex items-center gap-1">
        <svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
        Guardado
      </span>
    </div>
  </div>

  <textarea
    [value]="content"
    (input)="onInput($event)"
    rows="5"
    placeholder="Escribe notas rápidas, recordatorios o minutas para este día..."
    class="w-full bg-transparent text-white/70 text-xs leading-relaxed placeholder-white/15 resize-none outline-none focus:text-white/90 transition-colors">
  </textarea>

</div>
