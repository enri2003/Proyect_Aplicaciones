<div class="flex flex-col h-full gap-6 px-7 py-7 overflow-y-auto">

  <!-- Loading skeleton -->
  <ng-container *ngIf="loading">
    <div class="animate-pulse space-y-4">
      <div class="h-8 w-56 bg-white/5 rounded-xl"></div>
      <div class="h-4 w-96 bg-white/5 rounded-lg"></div>
      <div class="flex gap-4">
        <div class="flex-1 h-28 bg-white/5 rounded-2xl"></div>
        <div class="flex-1 h-28 bg-white/5 rounded-2xl"></div>
        <div class="flex-1 h-28 bg-white/5 rounded-2xl"></div>
      </div>
    </div>
  </ng-container>

  <!-- Error state -->
  <div *ngIf="error && !loading"
    class="bg-red-500/10 border border-red-500/20 rounded-2xl p-5 text-red-400 text-sm">
    {{ error }}
  </div>

  <!-- Dashboard content -->
  <ng-container *ngIf="stats && !loading">

    <!-- Header -->
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-white">
          Bienvenido, {{ userName }}
        </h1>
        <p class="text-sm text-gray-400 mt-1">
          Prepárate para tus compromisos de hoy. Tienes
          <span class="text-white font-medium">{{ stats!.upcomingMeetings.length }} reuniones</span>
          programadas en tu agenda ejecutiva.
        </p>
      </div>
      <div class="flex items-center gap-3">
        <button
          (click)="joinDemo()"
          class="flex items-center gap-2 bg-white/10 hover:bg-white/20 text-white text-sm font-semibold rounded-xl px-5 py-2.5 transition-colors border border-white/10"
        >
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
          Unirse a demo
        </button>
        <button
          (click)="openNewMeeting()"
          class="flex items-center gap-2 bg-white text-gray-900 text-sm font-semibold rounded-xl px-5 py-2.5 hover:bg-gray-100 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          Nueva reunión
        </button>
      </div>
    </div>

    <!-- Stats + Next meeting row -->
    <div class="flex gap-4 items-stretch">
      <!-- Stats cards (left, 2/3 width) -->
      <div class="flex-1">
        <app-dashboard-stats [stats]="stats"></app-dashboard-stats>
      </div>

      <!-- Next meeting hero (right, ~1/3 width) -->
      <div class="w-80 shrink-0">
        <app-next-meeting-hero [meeting]="stats.nextMeeting"></app-next-meeting-hero>
      </div>
    </div>

    <!-- Upcoming meetings section -->
    <div>
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <span class="text-sm font-semibold text-white">Próximas reuniones</span>
        </div>
        <button class="text-xs text-gray-500 hover:text-gray-300 uppercase tracking-wider transition-colors">
          Ver calendario completo
        </button>
      </div>

      <app-upcoming-meetings-list
        [meetings]="stats.upcomingMeetings">
      </app-upcoming-meetings-list>
    </div>

  </ng-container>
</div>

<!-- Modal Nueva Reunión -->
@if (showNewMeetingModal) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4"
       style="background: rgba(0,0,0,0.7);"
       (click)="showNewMeetingModal = false">
    <div class="w-full max-w-md rounded-2xl p-6"
         style="background:#181c1e; border:1px solid rgba(255,255,255,0.08);"
         (click)="$event.stopPropagation()">

      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold text-white">Nueva reunión</h2>
        <button (click)="showNewMeetingModal = false" class="text-white/30 hover:text-white transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="flex flex-col gap-4">

        <!-- Título -->
        <div>
          <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Título *</label>
          <input
            [(ngModel)]="newMeeting.title"
            type="text"
            placeholder="Reunión de estrategia Q3"
            class="w-full rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 outline-none"
            style="background:#1d2022; border:1px solid rgba(255,255,255,0.08);"
            onfocus="this.style.borderColor='rgba(0,85,255,0.5)'"
            onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
          />
        </div>

        <!-- Tipo -->
        <div>
          <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Tipo</label>
          <select
            [(ngModel)]="newMeeting.type"
            class="w-full rounded-xl px-4 py-3 text-sm text-white outline-none"
            style="background:#1d2022; border:1px solid rgba(255,255,255,0.08);">
            @for (t of meetingTypes; track t.value) {
              <option [value]="t.value" style="background:#1d2022">{{ t.label }}</option>
            }
          </select>
        </div>

        <!-- Fechas -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Inicio *</label>
            <input
              [(ngModel)]="newMeeting.startTime"
              type="datetime-local"
              class="w-full rounded-xl px-3 py-3 text-sm text-white outline-none"
              style="background:#1d2022; border:1px solid rgba(255,255,255,0.08); color-scheme:dark;"
              onfocus="this.style.borderColor='rgba(0,85,255,0.5)'"
              onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
            />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Fin *</label>
            <input
              [(ngModel)]="newMeeting.endTime"
              type="datetime-local"
              class="w-full rounded-xl px-3 py-3 text-sm text-white outline-none"
              style="background:#1d2022; border:1px solid rgba(255,255,255,0.08); color-scheme:dark;"
              onfocus="this.style.borderColor='rgba(0,85,255,0.5)'"
              onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
            />
          </div>
        </div>

        <!-- Descripción -->
        <div>
          <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Descripción</label>
          <textarea
            [(ngModel)]="newMeeting.description"
            placeholder="Opcional..."
            rows="2"
            class="w-full rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 outline-none resize-none"
            style="background:#1d2022; border:1px solid rgba(255,255,255,0.08);"
            onfocus="this.style.borderColor='rgba(0,85,255,0.5)'"
            onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
          ></textarea>
        </div>

        <!-- Confidencial -->
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" [(ngModel)]="newMeeting.isConfidential" class="w-4 h-4 accent-blue-500"/>
          <span class="text-sm text-white/60">Reunión confidencial</span>
        </label>

      </div>

      <div class="flex flex-col gap-2 mt-6">
        <!-- Iniciar ahora -->
        <button
          (click)="onStartNow()"
          [disabled]="!newMeeting.title || creatingMeeting"
          class="w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
          style="background:#0055ff; color:white;">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
          </svg>
          @if (creatingMeeting) { Iniciando... } @else { Iniciar ahora }
        </button>

        <div class="flex gap-2">
          <button
            (click)="showNewMeetingModal = false"
            class="flex-1 py-3 rounded-xl text-sm font-semibold text-white/50 hover:text-white transition-colors"
            style="background:rgba(255,255,255,0.05);">
            Cancelar
          </button>
          <button
            (click)="onCreateMeeting()"
            [disabled]="!newMeeting.title || !newMeeting.startTime || !newMeeting.endTime || creatingMeeting"
            class="flex-1 py-3 rounded-xl text-sm font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed"
            style="background:white; color:black;">
            @if (creatingMeeting) { Programando... } @else { Programar }
          </button>
        </div>
      </div>
    </div>
  </div>
}
