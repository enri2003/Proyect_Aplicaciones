<div class="flex flex-col gap-3">
  <div
    *ngFor="let meeting of meetings"
    class="bg-[#1d2022] border border-white/5 rounded-2xl px-5 py-4 flex items-center gap-4 hover:border-white/10 transition-colors"
  >
    <!-- Type icon -->
    <div class="w-10 h-10 rounded-xl bg-[#252a2c] border border-white/5 flex items-center justify-center shrink-0">
      <svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="typeIconPath(meeting.type)"/>
      </svg>
    </div>

    <!-- Info -->
    <div class="flex-1 min-w-0">
      <p class="text-sm font-semibold text-white truncate">{{ meeting.title }}</p>
      <p class="text-xs text-gray-400 mt-0.5 flex items-center gap-2">
        <!-- calendar icon -->
        <svg class="w-3 h-3 inline shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span>{{ formatDate(meeting.startTime) }}</span>
        <span class="text-gray-600">•</span>
        <!-- clock icon -->
        <svg class="w-3 h-3 inline shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>{{ formatTime(meeting.startTime) }} – {{ formatTime(meeting.endTime) }}</span>
      </p>
    </div>

    <!-- Avatars -->
    <div class="flex items-center shrink-0">
      <div class="flex -space-x-2">
        <div
          *ngFor="let p of visibleParticipants(meeting); let i = index"
          class="w-7 h-7 rounded-full border-2 border-[#1d2022] flex items-center justify-center text-[10px] font-bold text-white"
          [ngClass]="avatarColor(i)"
          [title]="p.name"
        >
          {{ initials(p.name) }}
        </div>
        <div
          *ngIf="extraCount(meeting) > 0"
          class="w-7 h-7 rounded-full border-2 border-[#1d2022] bg-[#3a3f42] flex items-center justify-center text-[10px] font-bold text-gray-400"
        >
          +{{ extraCount(meeting) }}
        </div>
      </div>
    </div>

    <!-- Action button -->
    <div class="shrink-0 ml-2">
      <!-- Entrar: shown only today + within 30 min of start -->
      <button
        *ngIf="canEnter(meeting)"
        class="bg-[#0055ff] hover:bg-[#0044cc] text-white text-sm font-semibold rounded-lg px-6 py-2 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/50"
      >
        Entrar
      </button>

      <!-- Programado: all other cases -->
      <span
        *ngIf="!canEnter(meeting)"
        class="text-sm font-medium text-gray-500 px-4 py-2"
      >
        Programado
      </span>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="meetings.length === 0"
    class="bg-[#1d2022] border border-white/5 rounded-2xl px-5 py-8 text-center">
    <p class="text-sm text-gray-500">No hay próximas reuniones programadas.</p>
  </div>
</div>
