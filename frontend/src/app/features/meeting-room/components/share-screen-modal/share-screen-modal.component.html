<!-- Backdrop -->
<div
  *ngIf="isOpen"
  class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm"
  (click)="onBackdropClick($event)"
>
  <!-- Modal container -->
  <div
    class="bg-[#131313] border border-white/10 rounded-3xl shadow-2xl w-[760px] max-w-[95vw] overflow-hidden flex flex-col"
    style="max-height: 90vh;"
  >
    <!-- ── Header ── -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-white/5">
      <div class="flex items-center gap-3">
        <!-- Logo -->
        <div class="w-7 h-7 rounded-lg bg-[#1d2022] border border-white/10 flex items-center justify-center">
          <span class="text-white text-xs font-bold">▲</span>
        </div>
        <div class="leading-tight">
          <p class="text-white font-semibold text-sm">Lead Meet</p>
          <p class="text-gray-500 text-[11px]">Compartir pantalla</p>
        </div>
      </div>
      <!-- Close button -->
      <button
        (click)="onCancel()"
        class="w-7 h-7 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors"
        aria-label="Cerrar"
      >
        <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- ── Body: sidebar + content ── -->
    <div class="flex flex-1 overflow-hidden min-h-0">

      <!-- Left sidebar — tabs -->
      <div class="w-52 shrink-0 border-r border-white/5 py-3 px-2 flex flex-col gap-0.5">
        <button
          *ngFor="let tab of tabs"
          (click)="selectTab(tab.id)"
          class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-colors w-full text-left"
          [ngClass]="activeTab === tab.id
            ? 'bg-[#0055ff]/15 text-[#4d8fff] font-medium border-l-2 border-[#0055ff]'
            : 'text-gray-400 hover:bg-white/5 hover:text-white border-l-2 border-transparent'"
        >
          <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="tab.iconPath"/>
          </svg>
          {{ tab.label }}
        </button>
      </div>

      <!-- Right panel — source cards -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Panel header -->
        <div class="flex items-center justify-between px-5 py-3 border-b border-white/5">
          <span class="text-xs text-gray-400 font-medium">Selecciona un elemento para compartir</span>
          <div class="flex gap-1">
            <button
              (click)="viewMode = 'grid'"
              class="p-1.5 rounded-lg transition-colors"
              [ngClass]="viewMode === 'grid' ? 'bg-white/10 text-white' : 'text-gray-500 hover:text-gray-300'"
              aria-label="Vista en cuadrícula"
            >
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
              </svg>
            </button>
            <button
              (click)="viewMode = 'list'"
              class="p-1.5 rounded-lg transition-colors"
              [ngClass]="viewMode === 'list' ? 'bg-white/10 text-white' : 'text-gray-500 hover:text-gray-300'"
              aria-label="Vista en lista"
            >
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Source cards — GRID view -->
        <div
          *ngIf="viewMode === 'grid'"
          class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3 content-start"
        >
          <button
            *ngFor="let source of activeSources"
            (click)="selectSource(source)"
            class="flex flex-col rounded-xl overflow-hidden transition-all border-2 focus:outline-none"
            [ngClass]="isSourceSelected(source)
              ? 'border-[#0055ff] shadow-[0_0_0_1px_#0055ff33]'
              : 'border-transparent hover:border-blue-500/50'"
          >
            <!-- Thumbnail area -->
            <div class="bg-[#0d1014] aspect-video flex items-center justify-center relative overflow-hidden">
              <img
                *ngIf="source.thumbnailDataUrl"
                [src]="source.thumbnailDataUrl"
                class="w-full h-full object-cover"
                [alt]="source.label"
              />
              <!-- Placeholder when no real thumbnail -->
              <div *ngIf="!source.thumbnailDataUrl" class="flex flex-col items-center gap-2">
                <!-- Screen icon placeholder -->
                <ng-container *ngIf="activeTab === 'screen'">
                  <div class="w-24 h-14 bg-[#1a2030] rounded border border-white/10 flex items-center justify-center">
                    <svg class="w-8 h-8 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1"/>
                    </svg>
                  </div>
                </ng-container>
                <!-- Window icon placeholder -->
                <ng-container *ngIf="activeTab === 'window'">
                  <div class="w-20 h-14 bg-[#1a2030] rounded border border-white/10 flex flex-col">
                    <div class="h-3 bg-[#252a2c] border-b border-white/5 flex items-center gap-1 px-1.5">
                      <span class="w-1.5 h-1.5 rounded-full bg-red-500/60"></span>
                      <span class="w-1.5 h-1.5 rounded-full bg-yellow-500/60"></span>
                      <span class="w-1.5 h-1.5 rounded-full bg-green-500/60"></span>
                    </div>
                    <div class="flex-1 flex items-center justify-center">
                      <svg class="w-6 h-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h7"/>
                      </svg>
                    </div>
                  </div>
                </ng-container>
                <!-- Browser tab icon placeholder -->
                <ng-container *ngIf="activeTab === 'browser'">
                  <div class="w-20 h-14 bg-[#1a2030] rounded border border-white/10 flex flex-col">
                    <div class="h-3 bg-[#252a2c] border-b border-white/5 flex items-center px-1.5">
                      <span class="text-[7px] text-gray-600 truncate">{{ source.label }}</span>
                    </div>
                    <div class="flex-1 flex items-center justify-center">
                      <svg class="w-6 h-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                        <path stroke-linecap="round" stroke-linejoin="round"
                          d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/>
                      </svg>
                    </div>
                  </div>
                </ng-container>
              </div>

              <!-- Selected overlay checkmark -->
              <div
                *ngIf="isSourceSelected(source)"
                class="absolute top-2 right-2 w-5 h-5 rounded-full bg-[#0055ff] flex items-center justify-center"
              >
                <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
            </div>

            <!-- Label -->
            <div class="bg-[#0f1215] px-3 py-2 flex items-center gap-2">
              <svg class="w-3.5 h-3.5 text-gray-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1"/>
              </svg>
              <span class="text-xs text-gray-300 truncate">{{ source.label }}</span>
            </div>
          </button>
        </div>

        <!-- Source cards — LIST view -->
        <div
          *ngIf="viewMode === 'list'"
          class="flex-1 overflow-y-auto p-3 flex flex-col gap-1.5"
        >
          <button
            *ngFor="let source of activeSources"
            (click)="selectSource(source)"
            class="flex items-center gap-3 px-4 py-3 rounded-xl border transition-all focus:outline-none"
            [ngClass]="isSourceSelected(source)
              ? 'border-[#0055ff] bg-[#0055ff]/10 text-white'
              : 'border-white/5 bg-[#0f1215] text-gray-300 hover:border-white/15 hover:bg-white/5'"
          >
            <svg class="w-4 h-4 shrink-0 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1"/>
            </svg>
            <span class="text-sm font-medium">{{ source.label }}</span>
            <div
              *ngIf="isSourceSelected(source)"
              class="ml-auto w-4 h-4 rounded-full bg-[#0055ff] flex items-center justify-center"
            >
              <svg class="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- ── Capture error banner ── -->
    <div *ngIf="captureError"
      class="mx-5 mb-0 mt-2 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-2.5 flex items-center gap-2">
      <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      <span class="text-xs text-red-400">{{ captureError }}</span>
    </div>

    <!-- ── Footer: toggles + actions ── -->
    <div class="border-t border-white/5 px-6 py-4 flex items-center justify-between gap-4">

      <!-- Toggles -->
      <div class="flex flex-col gap-2.5">
        <!-- Audio toggle -->
        <label class="flex items-center gap-3 cursor-pointer select-none">
          <button
            (click)="withAudio = !withAudio"
            class="relative w-9 h-5 rounded-full transition-colors focus:outline-none"
            [ngClass]="withAudio ? 'bg-[#0055ff]' : 'bg-white/15'"
            [attr.aria-checked]="withAudio"
            role="switch"
          >
            <span
              class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform"
              [ngClass]="withAudio ? 'translate-x-4' : 'translate-x-0'"
            ></span>
          </button>
          <span class="text-xs text-gray-300">Compartir audio del sistema</span>
        </label>

        <!-- Video optimize toggle -->
        <label class="flex items-center gap-3 cursor-pointer select-none">
          <button
            (click)="optimizeForVideo = !optimizeForVideo"
            class="relative w-9 h-5 rounded-full transition-colors focus:outline-none"
            [ngClass]="optimizeForVideo ? 'bg-[#0055ff]' : 'bg-white/15'"
            [attr.aria-checked]="optimizeForVideo"
            role="switch"
          >
            <span
              class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform"
              [ngClass]="optimizeForVideo ? 'translate-x-4' : 'translate-x-0'"
            ></span>
          </button>
          <span class="text-xs text-gray-300">Optimizar para videoclip</span>
        </label>
      </div>

      <!-- Action buttons -->
      <div class="flex items-center gap-3">
        <button
          (click)="onCancel()"
          class="px-6 py-2.5 text-sm font-semibold text-gray-300 hover:text-white transition-colors tracking-wide"
        >
          CANCELAR
        </button>
        <button
          (click)="onShare()"
          [disabled]="!canShare"
          class="bg-white text-black font-bold px-8 py-3 rounded-xl hover:bg-gray-200 transition-colors text-sm tracking-wide disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 min-w-[160px] justify-center"
        >
          <!-- Loading spinner -->
          <svg *ngIf="isLoading" class="w-4 h-4 animate-spin text-gray-700" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
          </svg>
          <span>{{ isLoading ? 'INICIANDO...' : 'COMPARTIR AHORA' }}</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Floating bottom control bar (sala activa) ── -->
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2">
    <div class="flex items-center gap-1 bg-[#1a1d1f] border border-white/10 rounded-2xl px-4 py-2.5 shadow-xl">
      <button class="flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl hover:bg-white/5 transition-colors">
        <svg class="w-5 h-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 016 0v6a3 3 0 01-3 3z"/>
        </svg>
        <span class="text-[10px] text-gray-400">Mic</span>
      </button>
      <button class="flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl hover:bg-white/5 transition-colors">
        <svg class="w-5 h-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        <span class="text-[10px] text-gray-400">Cámara</span>
      </button>
      <!-- Share — active state -->
      <button class="flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl bg-white/10 transition-colors">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
        </svg>
        <span class="text-[10px] text-white font-medium">Share</span>
      </button>
      <button class="flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl hover:bg-white/5 transition-colors">
        <svg class="w-5 h-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <span class="text-[10px] text-gray-400">Chat</span>
      </button>
      <!-- End call -->
      <button class="flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl bg-red-600/20 hover:bg-red-600/30 transition-colors ml-1">
        <svg class="w-5 h-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"/>
        </svg>
        <span class="text-[10px] text-red-400">End</span>
      </button>
    </div>
  </div>
</div>
