<aside class="w-56 min-h-screen bg-[#16181a] border-r border-white/5 flex flex-col py-5 px-3">
  <!-- Logo -->
  <div class="flex items-center gap-3 px-3 mb-8">
    <div class="w-8 h-8 rounded-lg bg-[#252a2c] border border-white/10 flex items-center justify-center">
      <span class="text-white font-bold text-sm">▲</span>
    </div>
    <div class="leading-tight">
      <p class="text-white font-bold text-sm tracking-wide">Lead Meet</p>
      <p class="text-gray-500 text-[10px] uppercase tracking-widest">Executive Portal</p>
    </div>
  </div>

  <!-- Nav items -->
  <nav class="flex flex-col gap-1 flex-1">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="bg-white/5 text-white"
      [routerLinkActiveOptions]="{ exact: item.route === '/' }"
      class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-colors text-sm font-medium"
    >
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.iconPath"/>
      </svg>
      {{ item.label }}
    </a>
  </nav>

  <!-- User profile footer -->
  <div class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 cursor-pointer transition-colors mt-4">
    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-xs font-bold text-white shrink-0">
      RM
    </div>
    <div class="min-w-0">
      <p class="text-sm font-medium text-white truncate">Ricardo Mendoza</p>
      <p class="text-[11px] text-gray-500 truncate">CEO, Lead Group</p>
    </div>
  </div>
</aside>
