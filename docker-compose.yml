version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leadmeet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: leadmeet
      POSTGRES_USER: leadmeet_user
      POSTGRES_PASSWORD: leadmeet_pass
    ports:
      - '5588:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leadmeet_user -d leadmeet']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
